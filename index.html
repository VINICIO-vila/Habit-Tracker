<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Hábitos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F2EFE8;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1A1A18;
    --text2: #6B6860;
    --text3: #9B9890;
    --radius: 14px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1E1E1C;
      --surface2: #272724;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #F0EDE6;
      --text2: #9B9890;
      --text3: #6B6860;
    }
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 3rem;
  }

  header {
    padding: 2.5rem 1.5rem 1.5rem;
    max-width: 680px;
    margin: 0 auto;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 0.25rem;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 6vw, 36px);
    font-weight: 400;
    color: var(--text);
    line-height: 1.1;
  }

  h1 em { font-style: italic; color: var(--text2); }

  .date-badge {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .week-note {
    font-size: 13px;
    color: var(--text3);
    margin-top: 6px;
  }

  .main { max-width: 680px; margin: 0 auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 1rem; }

  /* SUMMARY PILLS */
  .summary-pills {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .pill {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 0.75rem;
    text-align: center;
  }

  .pill .num {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    line-height: 1;
  }

  .pill .lbl {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* SECTION */
  .section {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .section-head {
    padding: 1rem 1.25rem 0.875rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-head svg { flex-shrink: 0; }

  .section-head-text { flex: 1; }
  .section-head-text strong { font-size: 14px; font-weight: 600; display: block; color: var(--text); }
  .section-head-text span { font-size: 12px; color: var(--text3); }

  /* OBJECTIVES */
  .obj-list { padding: 0.75rem 1rem; display: flex; flex-direction: column; gap: 6px; }

  .obj-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 10px;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    border: 0.5px solid var(--border);
    transition: opacity 0.15s;
  }

  .obj-icon {
    width: 34px; height: 34px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 17px;
  }

  .obj-body { flex: 1; min-width: 0; }
  .obj-name { font-size: 13.5px; font-weight: 500; color: var(--text); }
  .obj-desc { font-size: 11px; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .obj-progress {
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    font-size: 12px; font-weight: 500; color: var(--text2);
  }

  .mini-bar {
    width: 40px; height: 3px;
    background: var(--border2);
    border-radius: 2px;
    overflow: hidden;
  }
  .mini-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

  /* TRACKING TABLE */
  .table-wrap { overflow-x: auto; padding: 0 0 0.25rem; }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text3);
    padding: 8px 4px;
    text-align: center;
  }

  thead th.obj-col { text-align: left; padding-left: 1.25rem; min-width: 130px; }

  tbody tr { border-top: 0.5px solid var(--border); }

  tbody td { padding: 7px 4px; text-align: center; vertical-align: middle; }
  tbody td.obj-col {
    text-align: left;
    padding-left: 1.25rem;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
  }

  .obj-col-inner { display: flex; align-items: center; gap: 7px; }
  .obj-col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  th.today-col, td.today-col {
    background: rgba(130, 100, 60, 0.06);
  }

  th.today-col { color: #8B6914 !important; }
  @media (prefers-color-scheme: dark) {
    th.today-col { color: #D4A84B !important; }
    td.today-col { background: rgba(200, 160, 80, 0.08); }
  }

  .check-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    background: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    padding: 0;
  }

  .check-btn:hover { border-color: var(--text3); transform: scale(1.1); }
  .check-btn:active { transform: scale(0.95); }

  .check-btn.done {
    border: none;
  }

  .check-btn svg { display: none; }
  .check-btn.done svg { display: block; }

  /* RESET BTN */
  .reset-row { padding: 0.875rem 1.25rem 1rem; border-top: 0.5px solid var(--border); display: flex; justify-content: flex-end; }
  .reset-btn {
    background: none;
    border: 0.5px solid var(--border2);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { color: var(--text2); border-color: var(--text3); }

  /* MOBILE */
  @media (max-width: 480px) {
    h1 { font-size: 26px; }
    .obj-desc { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Mis<br><em>hábitos</em></h1>
    <div class="date-badge" id="date-badge">—</div>
  </div>
  <p class="week-note" id="week-note">Semana en progreso</p>
</header>

<main class="main">

  <div class="summary-pills" id="summary-pills">
    <div class="pill"><div class="num" id="s-today">0</div><div class="lbl">Hoy</div></div>
    <div class="pill"><div class="num" id="s-week">0</div><div class="lbl">Semana</div></div>
    <div class="pill"><div class="num" id="s-pct">0%</div><div class="lbl">Total</div></div>
  </div>

  <div class="section">
    <div class="section-head">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="7.5" stroke="currentColor" stroke-width="1.2" opacity=".4"/>
        <path d="M5.5 9L7.5 11L12.5 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="section-head-text">
        <strong>Objetivos</strong>
        <span>5 hábitos para construir cada día</span>
      </div>
    </div>
    <div class="obj-list" id="obj-list"></div>
  </div>

  <div class="section">
    <div class="section-head">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="1.5" y="3.5" width="15" height="13" rx="2" stroke="currentColor" stroke-width="1.2" opacity=".4"/>
        <path d="M1.5 7.5H16.5" stroke="currentColor" stroke-width="1.2" opacity=".5"/>
        <path d="M6 1.5V4.5M12 1.5V4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <div class="section-head-text">
        <strong>Seguimiento semanal</strong>
        <span>Marcá cada hábito completado por día</span>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead id="t-head"></thead>
        <tbody id="t-body"></tbody>
      </table>
    </div>
    <div class="reset-row">
      <button class="reset-btn" onclick="resetWeek()">↺ Reiniciar semana</button>
    </div>
  </div>

</main>

<script>
const OBJECTIVES = [
  { id: 'food',   emoji: '🥩', name: 'Comer en volumen',        desc: 'Alimentación acorde a tus objetivos', color: '#C07A16' },
  { id: 'water',  emoji: '💧', name: 'Hidratación diaria',       desc: 'Tomar 2 litros de agua al día', color: '#2B7FBF' },
  { id: 'screen', emoji: '📵', name: 'Menos tiempo de pantalla', desc: '30 min menos de scroll sin propósito', color: '#B04A7A' },
  { id: 'read',   emoji: '📖', name: 'Leer 30 minutos',          desc: 'Lectura consciente sin distracciones', color: '#3A8A3A' },
  { id: 'learn',  emoji: '🧠', name: 'Aprender algo nuevo',      desc: 'Estudiar o expandir tu conocimiento', color: '#6040C0' },
];

const DAYS_SHORT = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const DAYS_FULL = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function getTodayIdx() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

function getWeekKey() {
  const now = new Date();
  const day = now.getDay() === 0 ? 7 : now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day - 1));
  return `week_${mon.getFullYear()}_${mon.getMonth()}_${mon.getDate()}`;
}

let state = {};
function loadState() {
  const wk = getWeekKey();
  try {
    const raw = localStorage.getItem('habitos_v2');
    const parsed = raw ? JSON.parse(raw) : {};
    if (parsed.week === wk) {
      state = parsed.data || {};
    } else {
      state = {};
      saveState();
    }
  } catch(e) { state = {}; }
}

function saveState() {
  try {
    localStorage.setItem('habitos_v2', JSON.stringify({ week: getWeekKey(), data: state }));
  } catch(e) {}
}

function key(objId, dayIdx) { return objId + '_' + dayIdx; }

function initHeader() {
  const now = new Date();
  const todayIdx = getTodayIdx();
  document.getElementById('date-badge').textContent = `${DAYS_FULL[todayIdx]}, ${now.getDate()} de ${MONTHS[now.getMonth()]}`;
  const mon = new Date(now);
  mon.setDate(now.getDate() - todayIdx);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  document.getElementById('week-note').textContent = `${mon.getDate()} ${MONTHS[mon.getMonth()]} — ${sun.getDate()} ${MONTHS[sun.getMonth()]} ${sun.getFullYear()}`;
}

function renderSummary() {
  const todayIdx = getTodayIdx();
  const todayDone = OBJECTIVES.filter(o => state[key(o.id, todayIdx)]).length;
  const weekDone = OBJECTIVES.reduce((acc, o) => acc + DAYS_SHORT.filter((_, di) => state[key(o.id, di)]).length, 0);
  const max = OBJECTIVES.length * 7;
  const pct = Math.round((weekDone / max) * 100);
  document.getElementById('s-today').textContent = todayDone + '/' + OBJECTIVES.length;
  document.getElementById('s-week').textContent = weekDone;
  document.getElementById('s-pct').textContent = pct + '%';
}

function renderObjectives() {
  const el = document.getElementById('obj-list');
  el.innerHTML = OBJECTIVES.map(o => {
    const done = DAYS_SHORT.filter((_, di) => state[key(o.id, di)]).length;
    const pct = Math.round((done / 7) * 100);
    return `<div class="obj-row">
      <div class="obj-icon" style="background:${o.color}18">${o.emoji}</div>
      <div class="obj-body">
        <div class="obj-name">${o.name}</div>
        <div class="obj-desc">${o.desc}</div>
      </div>
      <div class="obj-progress">
        <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%;background:${o.color}"></div></div>
        <span>${done}/7</span>
      </div>
    </div>`;
  }).join('');
}

function renderTable() {
  const todayIdx = getTodayIdx();
  const head = document.getElementById('t-head');
  const body = document.getElementById('t-body');

  head.innerHTML = `<tr>
    <th class="obj-col">Objetivo</th>
    ${DAYS_SHORT.map((d, di) => `<th class="${di === todayIdx ? 'today-col' : ''}">${d}</th>`).join('')}
  </tr>`;

  body.innerHTML = OBJECTIVES.map(o => {
    const cells = DAYS_SHORT.map((d, di) => {
      const done = !!state[key(o.id, di)];
      return `<td class="${di === todayIdx ? 'today-col' : ''}">
        <button class="check-btn${done ? ' done' : ''}"
          onclick="toggle('${o.id}',${di})"
          aria-label="${done ? 'Desmarcar' : 'Marcar'} ${o.name}"
          style="${done ? 'background:' + o.color + ';' : ''}">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6L5 9L10 3.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </td>`;
    }).join('');
    return `<tr>
      <td class="obj-col">
        <div class="obj-col-inner">
          <div class="obj-col-dot" style="background:${o.color}"></div>
          ${o.name}
        </div>
      </td>
      ${cells}
    </tr>`;
  }).join('');
}

function toggle(objId, dayIdx) {
  const k = key(objId, dayIdx);
  state[k] = !state[k];
  saveState();
  renderObjectives();
  renderSummary();
  renderTable();
}

function resetWeek() {
  if (confirm('¿Reiniciar todos los hábitos de esta semana?')) {
    state = {};
    saveState();
    renderObjectives();
    renderSummary();
    renderTable();
  }
}

loadState();
initHeader();
renderSummary();
renderObjectives();
renderTable();
</script>
</body>
</html>
